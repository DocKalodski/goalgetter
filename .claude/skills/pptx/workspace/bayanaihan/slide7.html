<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0038A8; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header-bar {
  background: #CE1126; height: 6pt; width: 100%;
}
.content {
  flex: 1; padding: 30pt 40pt; display: flex; flex-direction: column;
  justify-content: center;
}
h1 { color: #FCD116; font-size: 32pt; margin: 0 0 20pt 0; text-align: center; }
.next-steps { display: flex; gap: 20pt; justify-content: center; }
.step {
  background: rgba(255,255,255,0.1); padding: 20pt;
  width: 180pt; text-align: center;
}
.step-num { color: #FCD116; font-size: 36pt; font-weight: bold; margin: 0 0 10pt 0; }
.step h3 { color: #FFFFFF; font-size: 12pt; margin: 0 0 8pt 0; }
.step p { color: #FFFFFF; font-size: 10pt; margin: 0; opacity: 0.9; }
.cta {
  background: #CE1126; padding: 15pt 30pt; margin-top: 25pt;
  text-align: center; align-self: center;
}
.cta p { color: #FFFFFF; font-size: 14pt; margin: 0; }
.footer-bar {
  background: #FCD116; height: 6pt; width: 100%;
}
</style>
</head>
<body>
<div class="header-bar"></div>
<div class="content">
  <h1>Next Steps</h1>
  <div class="next-steps">
    <div class="step">
      <p class="step-num">1</p>
      <h3>Generate Launch Kit</h3>
      <p>Create all content deliverables for Jan 6-8 workshop</p>
    </div>
    <div class="step">
      <p class="step-num">2</p>
      <h3>Execute Campaign</h3>
      <p>Post live during ISPSC Candon workshop</p>
    </div>
    <div class="step">
      <p class="step-num">3</p>
      <h3>Build Content Factory</h3>
      <p>Create Q101 automated system post-workshop</p>
    </div>
  </div>
  <div class="cta">
    <p>Ready to generate Launch Kit content</p>
  </div>
</div>
<div class="footer-bar"></div>
</body>
</html>
